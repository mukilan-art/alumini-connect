<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts from Connections | Alumni Connect</title>
    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-blue: #3498db;
            --bg-gray: #f4f7f6;
            --white: #ffffff;
            --border-color: #dcdde1;
            --text-dark: #333;
            --text-light: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { display: flex; background: var(--bg-gray); min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--primary-dark);
            color: white;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h2 { margin-bottom: 30px; text-align: center; color: var(--accent-blue); }

        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 15px; }
        .nav-links a {
            color: #ecf0f1;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .nav-links a:hover { background: var(--accent-blue); }
        .nav-links a.active { background: var(--accent-blue); }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* Posts Container */
        .posts-container {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Post Card */
        .post-card {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            transition: 0.3s;
            background: var(--white);
        }

        .post-card:hover {
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.15);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .author-info {
            flex: 1;
        }

        .author-name {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 1.1rem;
        }

        .author-details {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .post-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .category-badge {
            display: inline-block;
            background: #e3f2fd;
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .post-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 15px 0 10px 0;
        }

        .post-content {
            color: var(--text-dark);
            line-height: 1.6;
            margin: 15px 0;
            max-height: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-content.expanded {
            max-height: none;
        }

        .view-more-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0;
            margin-top: 10px;
        }

        .view-more-btn:hover {
            text-decoration: underline;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .spinner {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error State */
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Filter Section */
        .filter-section {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: var(--white);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        @media (max-width: 768px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 20px; }
            .posts-container { padding: 20px; }
            .header h1 { font-size: 1.5rem; }
            .post-card { padding: 15px; }
        }

        @media (max-width: 600px) {
            .sidebar { width: 100%; position: relative; height: auto; padding: 15px; }
            .main-content { margin-left: 0; padding: 15px; }
            .posts-container { padding: 15px; }
            .header h1 { font-size: 1.3rem; }
            .post-card { padding: 15px; }
            .post-header { gap: 10px; }
            .author-avatar { width: 40px; height: 40px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Connect+</h2>
        <ul class="nav-links">
            <li><a href="student-dashboard.html">🏠 Dashboard</a></li>
            <li><a href="view-posts.html" class="active">📰 Connection Posts</a></li>
            <li><a href="student-connections.html">👥 My Connections</a></li>
            <li><a href="profile-settings.html">⚙️ Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Posts from Your Connections</h1>
            <p>Stay updated with insights, career advice, and announcements from your connected alumni.</p>
        </div>

        <div class="posts-container">
            <div id="filterSection" class="filter-section" style="display: none;">
                <label style="font-weight: 600; color: var(--text-dark);">Filter by Category:</label>
                <button class="filter-btn active" data-category="all">All Posts</button>
                <button class="filter-btn" data-category="Career Advice">Career Advice</button>
                <button class="filter-btn" data-category="Industry News">Industry News</button>
                <button class="filter-btn" data-category="Mentorship Tips">Mentorship Tips</button>
                <button class="filter-btn" data-category="Event Announcement">Events</button>
                <button class="filter-btn" data-category="Job Vacancy">Job Vacancy</button>
                <button class="filter-btn" data-category="Internship">Internship</button>
                <button class="filter-btn" data-category="Workshop / Event">Workshop</button>
                <button class="filter-btn" data-category="Career Opportunity">Career Opportunity</button>
                <button class="filter-btn" data-category="Other">Other</button>
            </div>

            <div id="errorContainer"></div>

            <div id="postsContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading posts...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let allPosts = [];
        let currentFilter = 'all';

        // Check authentication
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            const userType = localStorage.getItem('userType');

            if (!token || !userId) {
                window.location.href = 'studentlogin.html';
                return;
            }

            if (userType !== 'student') {
                showError('This page is for students only.');
                return;
            }

            await loadPosts(userId, token);
            setupFilterButtons();
        });

        async function loadPosts(userId, token) {
            const API_URL = (typeof BACKEND_URL !== 'undefined') ? BACKEND_URL : await resolveBackendUrl();
            
            try {
                const response = await fetch(`${API_URL}/api/posts/connections/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error(response.status === 403 ? 'Unauthorized' : 'Failed to load posts');
                }

                allPosts = await response.json();
                
                // Show filter section if there are posts
                if (allPosts.length > 0) {
                    document.getElementById('filterSection').style.display = 'flex';
                }
                
                displayPosts(allPosts);
            } catch (error) {
                console.error('Error loading posts:', error);
                showError('Unable to load posts. Please try again later.');
            }
        }

        function displayPosts(posts) {
            const container = document.getElementById('postsContent');

            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h2>No Posts Yet</h2>
                        <p>Your connections haven't shared any information yet.<br/>Check back soon!</p>
                        <a href="student-connections.html" class="btn-primary">View My Connections</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="posts-list">
                    ${posts.map(post => createPostCard(post)).join('')}
                </div>
            `;

            // Add event listeners to view more buttons
            document.querySelectorAll('.view-more-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const postContent = this.previousElementSibling;
                    postContent.classList.toggle('expanded');
                    this.innerText = postContent.classList.contains('expanded') ? 'View Less' : 'View More';
                });
            });
        }

        function createPostCard(post) {
            const author = post.authorId || {};
            const createdDate = new Date(post.createdAt);
            const timeAgo = getTimeAgo(createdDate);
            const authorInitial = author.fullName ? author.fullName.charAt(0).toUpperCase() : 'A';

            return `
                <div class="post-card" data-category="${post.category}">
                    <div class="post-header">
                        <div class="author-avatar">${authorInitial}</div>
                        <div class="author-info">
                            <div class="author-name">${author.fullName || 'Alumni'}</div>
                            <div class="author-details">${author.profession || 'Professional'}</div>
                            <div class="post-meta">
                                <span class="category-badge">${post.category}</span>
                                <span class="post-date">${timeAgo}</span>
                            </div>
                        </div>
                    </div>
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    ${post.domain ? `<p class="post-content"><strong>Domain:</strong> ${escapeHtml(post.domain)}</p>` : ''}
                    ${post.location ? `<p class="post-content"><strong>Location:</strong> ${escapeHtml(post.location)}</p>` : ''}
                    ${post.applyLink ? `<p class="post-content"><strong>Apply / Join:</strong> <a href="${escapeHtml(post.applyLink)}" target="_blank" style="color:#2563eb; text-decoration: underline;">${escapeHtml(post.applyLink)}</a></p>` : ''}
                    ${post.eventDate ? `<p class="post-content"><strong>Event Time:</strong> ${new Date(post.eventDate).toLocaleString()}</p>` : ''}
                    <p class="post-content">${escapeHtml(post.content)}</p>
                    ${post.content.length > 300 ? '<button class="view-more-btn">View More</button>' : ''}
                </div>
            `;
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - new Date(date);
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;

            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    currentFilter = this.dataset.category;
                    
                    const filtered = currentFilter === 'all' 
                        ? allPosts 
                        : allPosts.filter(post => post.category === currentFilter);
                    
                    displayPosts(filtered);
                });
            });
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
            document.getElementById('postsContent').innerHTML = '';
        }
    </script>
</body>
</html>
