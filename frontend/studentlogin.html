<!DOCTYPE html>
<html lang="en">
  <script src="config.js"></script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login</title>
  <style>
    /* Theme Reset (Identical to alumni-login for consistency) */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      /* --- BACKGROUND STYLES --- */
      position: relative;
      background: url("https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1500&q=80") no-repeat center center/cover;
      color: #333;
    }
    /* Dark overlay for better text/card readability */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }
    /* --- END BACKGROUND STYLES --- */

    .container {
      padding: 40px;
      border-radius: 12px;
      /* --- NEW LOGIN BOX COLOR: Dark transparent black --- */
      background-color: rgba(0, 0, 0, 0.4); 
      backdrop-filter: blur(15px); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9); 
      border: 1px solid rgba(255, 255, 255, 0.2); 
      width: 90%;
      max-width: 450px;
      text-align: center;
      z-index: 1;
    }
    
    /* --- NEW: Welcome Text Style --- */
    .welcome-text {
      font-size: 1.5rem;
      font-weight: 300;
      color: #E0E0E0;
      margin-bottom: 5px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }
    
    .heading {
      font-size: 2rem;
      margin-bottom: 25px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-field {
      position: relative;
    }
    .input-field input {
      width: 100%;
      padding: 15px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.3s;
      background-color: rgba(255, 255, 255, 0.95);
      color: #333;
    }
    .input-field input:focus {
      border-color: #3498db;
      outline: none;
    }
    .input-field label {
      position: absolute;
      top: 15px;
      left: 10px;
      color: #555;
      pointer-events: none;
      transition: 0.2s ease all;
      background-color: rgba(255, 255, 255, 0.95);
      padding: 0 5px;
      border-radius: 3px;
    }
    /* Move label up when input is focused or has content */
    .input-field input:focus ~ label,
    .input-field input:not(:placeholder-shown) ~ label {
      top: -10px;
      left: 8px;
      font-size: 0.75rem;
      color: #3498db;
    }
    .btn {
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #3498db;
      color: white;
      transition: background-color 0.3s ease;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #2980b9;
    }
    .acc-text {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }
    .acc-text span {
      color: #66D9FF;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.3s;
    }
    .acc-text span:hover {
      color: #3498db;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="welcome-text">Welcome</p> <h2 class="heading">Student Login</h2>
    <form class="form" id="studentLoginForm">
      <div class="input-field">
        <input required="" autocomplete="off" type="email" name="email" id="email" placeholder=" " />
        <label for="email">Email</label>
      </div>
      <div class="input-field">
        <input required="" autocomplete="off" type="password" name="password" id="password" placeholder=" " />
        <label for="password">Password</label>
      </div>
      <div style="text-align:left; font-size:0.9rem; color:#E0E0E0;">
        <label><input type="checkbox" id="showPassword"> Show password</label>
      </div>
      <button class="btn" type="submit">Log In</button>
    </form>
    <div class="acc-text">
      New here?
      <span onclick="window.location.href='studentregister.html'">Create Account</span>
    </div>
  </div>
<script src="config.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_URL = (typeof BACKEND_URL !== 'undefined') ? BACKEND_URL : "http://localhost:5000";
        
        // MATCHING THE ID: studentLoginForm
        const loginForm = document.getElementById('studentLoginForm');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // This stops the page from clearing your details

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch(`${API_URL}/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password,userType: 'student' })
                        
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('userId', data.userId);
                        localStorage.setItem('userType', 'student'); // Force student type

                        alert('Student Login Successful!');
                        window.location.href = 'student-dashboard.html';
                    } else {
                        alert('Login Failed: ' + data.message);
                    }
                } catch (error) {
                    alert('Server Error: Is your backend running on port 5000?');
                }
            });
        }

        // Show password toggle
        const studentPw = document.getElementById('password');
        const studentShow = document.getElementById('showPassword');
        if (studentShow && studentPw) {
            studentShow.addEventListener('change', (e) => {
                studentPw.type = e.target.checked ? 'text' : 'password';
            });
        }
    });
</script>
