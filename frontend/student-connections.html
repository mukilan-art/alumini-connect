<!DOCTYPE html>
<html lang="en">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Connections | Alumni Connect</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --light-bg: #ecf0f1;
            --white: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ecf0f1 0%, #bdc3c7 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            color: var(--text-dark);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .connections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .connection-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .connection-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .profile-image-wrapper {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-image.placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            font-weight: bold;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .profile-profession {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-email {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 12px;
            word-break: break-word;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-visit {
            background: var(--accent-color);
            color: var(--white);
        }

        .btn-visit:hover {
            background: #2980b9;
            transform: scale(1.02);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--white);
            padding: 12px 24px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .error-container {
            grid-column: 1 / -1;
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        .retry-btn {
            background: #c33;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: 600;
        }

        .retry-btn:hover {
            background: #a22;
        }

        @media (max-width: 768px) {
            .connections-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .profile-image-wrapper {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Connections</h1>
            <p>Professional network of accomplished alumni</p>
        </div>

        <div id="connectionsList" class="connections-grid">
            <div class="empty-state">
                <div class="empty-state-icon">📱</div>
                <h2>Loading connections...</h2>
                <p>Please wait while we fetch your alumni connections</p>
            </div>
        </div>
    </div>

    <script>
        const API = (typeof BACKEND_URL !== 'undefined') ? BACKEND_URL : 'http://localhost:5000';
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');

        async function loadConnections() {
            try {
                const res = await fetch(`${API}/api/users/${userId}/connections`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const container = document.getElementById('connectionsList');
                
                if (!res.ok) {
                    const errBody = await res.json().catch(()=>null);
                    const msg = (errBody && errBody.message) ? errBody.message : res.statusText || 'Failed to load';
                    container.innerHTML = `
                        <div class="error-container">
                            <strong>Error loading connections:</strong> ${msg}
                            <br><button class="retry-btn" id="retryBtn">Retry</button>
                        </div>
                    `;
                    document.getElementById('retryBtn').addEventListener('click', () => loadConnections());
                    return;
                }

                const data = await res.json();
                if (!data || data.length === 0) { 
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🔗</div>
                            <h2>No connections yet</h2>
                            <p>Start building your professional network by searching for alumni</p>
                        </div>
                    `; 
                    return; 
                }

                container.innerHTML = data.map(c => {
                    const initial = c.fullName ? c.fullName.charAt(0).toUpperCase() : 'A';
                    const imageSrc = c.profileImage || '';
                    const imageHtml = imageSrc 
                        ? `<img src="${imageSrc}" alt="${c.fullName}" class="profile-image">`
                        : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); color: white; font-size: 3rem; font-weight: bold;">${initial}</div>`;

                    return `
                        <div class="connection-card">
                            <div class="profile-image-wrapper">
                                ${imageHtml}
                            </div>
                            <div class="card-content">
                                <div class="profile-name">${c.fullName || 'Alumnus'}</div>
                                <div class="profile-profession">${c.profession || 'Professional'}</div>
                                ${c.email ? `<div class="profile-email">${c.email}</div>` : ''}
                                <div class="card-actions">
                                    <button class="btn btn-visit" data-id="${c._id}">View Profile</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.btn-visit').forEach(b => b.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    window.location.href = `user-profile.html?userId=${id}`;
                }));
            } catch (err) {
                console.error('Load connections failed', err);
                const container = document.getElementById('connectionsList');
                container.innerHTML = `
                    <div class="error-container">
                        <strong>Connection Error:</strong> ${err.message || 'Network/server error'}
                        <br><button class="retry-btn" id="retryBtn">Retry</button>
                    </div>
                `;
                document.getElementById('retryBtn').addEventListener('click', () => loadConnections());
            }
        }

        window.onload = () => { 
            if (!token || !userId) return window.location.href = 'studentlogin.html'; 
            loadConnections(); 
        };
    </script>
</body>
</html>
