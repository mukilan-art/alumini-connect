<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <style>
    body{font-family:Inter,Segoe UI,Arial,sans-serif;background:#eef3f8;margin:0;color:#0f172a}
    .chat-page{max-width:1120px;margin:32px auto;display:grid;grid-template-columns:320px minmax(0,1fr);gap:24px;min-height:calc(100vh - 64px);padding:24px}
    .sidebar{background:#0f172a;color:#f8fafc;border-radius:24px;box-shadow:0 24px 60px rgba(15,23,42,0.12);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-header{padding:24px 24px 0}
    .sidebar-header h3{margin:0;font-size:1.2rem;letter-spacing:0.01em}
    .sidebar-header small{display:block;margin-top:8px;color:#cbd5e1;font-size:0.95rem;line-height:1.6}
    .search-box{padding:0 24px}
    .search-box input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #334155;background:#111827;color:#f8fafc;outline:none;transition:box-shadow .2s, border-color .2s}
    .search-box input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    .contacts{margin:16px 0 0;padding:0 24px 24px;overflow:auto}
    .contact-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:18px;cursor:pointer;transition:background .2s,transform .2s}
    .contact-item:hover{background:rgba(255,255,255,.06);transform:translateX(1px)}
    .contact-item.active{background:#1e293b;border-left:4px solid #3b82f6;color:#fff}
    .contact-preview{display:flex;align-items:center;gap:12px}
    .contact-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.12)}
    .contact-info{min-width:0}
    .contact-name{font-weight:700;font-size:0.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .contact-detail{font-size:0.82rem;color:#94a3b8;line-height:1.4}
    .conv-area{display:flex;flex-direction:column;background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(15,23,42,0.08);overflow:hidden}
    .conv-header{padding:22px 26px;border-bottom:1px solid #e2e8f0;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .conv-header .title-group{min-width:0}
    .conv-title{margin:0;font-size:1.1rem;font-weight:700}
    .conv-subtitle{margin:6px 0 0;font-size:0.94rem;color:#64748b;line-height:1.4}
    .conv-controls{display:flex;gap:12px;flex-wrap:wrap}
    .conv-messages{flex:1;padding:24px;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,#f8fafc 0%,#eff6ff 100%);display:flex;flex-direction:column;gap:14px}
    .chat-msg{max-width:74%;padding:16px 18px;border-radius:20px;box-shadow:0 10px 24px rgba(15,23,42,0.06);position:relative;word-break:break-word}
    .chat-msg-sent{margin-left:auto;background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-bottom-right-radius:6px}
    .chat-msg-recv{margin-right:auto;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:6px}
    .chat-text{font-size:0.96rem;color:#0f172a;line-height:1.7}
    .chat-meta{font-size:0.78rem;color:#64748b;text-align:right;margin-top:8px}
    .chat-sender-name{font-size:0.8rem;color:#2563eb;font-weight:700}
    .conversation-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#475569;text-align:center;gap:14px;padding:32px}
    .conversation-placeholder h4{margin:0;font-size:1.15rem}
    .conversation-placeholder p{max-width:440px;margin:0;color:#64748b;line-height:1.75}
    .conv-input{padding:18px 24px 24px;border-top:1px solid #e2e8f0;background:#fff;display:flex;gap:12px}
    .conv-input input{flex:1;padding:14px 16px;border-radius:16px;border:1px solid #cbd5e1;background:#f8fafc;outline:none;font-size:1rem}
    .conv-input input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    .btn{background:#2563eb;color:#fff;padding:12px 18px;border-radius:16px;border:none;cursor:pointer;font-weight:700;transition:transform .2s,background .2s}
    .btn:hover{background:#1d4ed8;transform:translateY(-1px)}
    .notification-popup{position:fixed;top:20px;right:20px;background:#16a34a;color:white;padding:14px 18px;border-radius:16px;box-shadow:0 16px 40px rgba(15,23,42,.18);z-index:1000;animation:slideIn .28s ease-out}
    @keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
    .contact-item.unread::after{content:'';width:10px;height:10px;border-radius:50%;background:#f97316;margin-left:auto}
    @media(max-width:900px){.chat-page{grid-template-columns:1fr;min-height:auto}.sidebar{width:auto}.conv-area{min-height:calc(100vh - 260px)}}
    @media(max-width:640px){.conv-header,.sidebar-header,.search-box,.contacts,.conv-input{padding-left:18px;padding-right:18px}.conv-input{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="chat-page">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Messages</h3>
        <small>Connect with alumni and students in a polished, professional chat environment.</small>
      </div>
      <div class="search-box">
        <input id="contact-search" type="search" placeholder="Search contacts" aria-label="Search contacts" />
      </div>
      <div class="contacts" id="contactsList">
        <!-- Contact list is populated dynamically -->
      </div>
    </aside>

    <section class="conv-area">
      <div class="conv-header">
        <div class="title-group">
          <h2 id="chat-title" class="conv-title">Select a conversation</h2>
          <div id="chat-subtitle" class="conv-subtitle">Choose a contact to begin a professional exchange.</div>
        </div>
        <div class="conv-controls">
          <button id="backToSearch" class="btn" type="button">Back</button>
        </div>
      </div>

      <div id="chat-messages" class="conv-messages">
        <div id="chat-placeholder" class="conversation-placeholder">
          <h4>Ready to message</h4>
          <p>Select a contact from the left to view your conversation. Your messages will appear here once a contact is selected.</p>
        </div>
      </div>

      <div class="conv-input">
        <input id="chat-input" placeholder="Write a message..." autocomplete="off" />
        <button id="chat-send" class="btn" type="button">Send</button>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="assets/js/chat.js"></script>
  <script>
    function getQuery() { const p=new URLSearchParams(location.search); return { userId: p.get('userId'), name: p.get('name') } }

    document.addEventListener('DOMContentLoaded', ()=>{
      // make sure user is authenticated before proceeding
      const token = localStorage.getItem('token');
      const userId = localStorage.getItem('userId');
      const userType = localStorage.getItem('userType');

      if (!token || !userId) {
        alert('You must be logged in to use chat');
        window.location.href = userType === 'alumni' ? 'alumnilogin.html' : 'studentlogin.html';
        return;
      }

      // load contacts (connections) and render in sidebar
      async function loadContactsList(){
        try{
          const API_URL = (typeof BACKEND_URL !== 'undefined') ? BACKEND_URL : location.origin;
          const res = await fetch(`${API_URL}/api/users/${userId}/connections`, { headers: { 'Authorization': 'Bearer '+token } });
          const listEl = document.getElementById('contactsList');
          if (!listEl) return;
          listEl.innerHTML = '';
          if (!res.ok){ listEl.innerHTML = '<div style="color:#94a3b8">Unable to load connections.</div>'; return; }
          const conns = await res.json();
          if (!conns || conns.length === 0){ listEl.innerHTML = '<div style="color:#94a3b8">No connections yet.</div>'; return; }

          conns.forEach(c => {
            const item = document.createElement('div');
            item.className = 'contact-item';
            item.setAttribute('data-user-id', c._id);
            const left = document.createElement('div'); left.className = 'contact-preview';
            const avatar = document.createElement('img'); avatar.className = 'contact-avatar'; avatar.src = c.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.fullName||'User')}`;
            const info = document.createElement('div'); info.className = 'contact-info'; info.innerHTML = `<div class="contact-name">${c.fullName || c.email || 'Unknown'}</div><div class="contact-detail">${c.profession || ''}</div>`;
            left.appendChild(avatar); left.appendChild(info);

            item.appendChild(left);
            item.addEventListener('click', ()=>{
              // Remove active class from all contact items
              document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
              // Add active class to clicked item
              item.classList.add('active');
              window.initChatWith(c._id, c.fullName || c.email || 'Chat');
              item.classList.remove('unread');
            });

            listEl.appendChild(item);
          });
        }catch(e){ console.error('Load contacts failed', e); }
      }

      const q = getQuery();
      if (q.userId) {
        // initialize chat with partner from query
        window.initChatWith(q.userId, decodeURIComponent(q.name || 'Chat'));
        // Highlight the active contact after contacts are loaded
        setTimeout(() => {
          const activeContact = document.querySelector(`.contact-item[data-user-id="${q.userId}"]`);
          if (activeContact) {
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            activeContact.classList.add('active');
          }
        }, 1000); // Small delay to ensure contacts are loaded
      }

      document.getElementById('backToSearch').addEventListener('click', ()=>{
        const userType = localStorage.getItem('userType');
        window.location.href = userType === 'alumni' ? 'alumni-dashboard.html' : 'student-dashboard.html';
      });

      const searchInput = document.getElementById('contact-search');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          const filter = searchInput.value.trim().toLowerCase();
          document.querySelectorAll('.contact-item').forEach(item => {
            const name = item.querySelector('.contact-name')?.textContent.toLowerCase() || '';
            item.style.display = name.includes(filter) ? '' : 'none';
          });
        });
      }

      // populate contacts list on load
      loadContactsList();
    });
  </script>
</body>
</html>
