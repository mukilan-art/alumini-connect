<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>Request Mentorship | Alumni Connect</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --success: #2ecc71;
            --bg: #f4f7f6;
            --white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        .card { background: var(--white); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        h2 { color: var(--primary); margin-bottom: 10px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary); }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        .search-results { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; background: #f9f9f9; }
        .alumni-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .alumni-item:hover { background: #f0f0f0; }
        .alumni-name { font-weight: 600; color: var(--primary); }
        .alumni-profession { color: #666; font-size: 0.9rem; }
        .selected-alumni { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .selected-alumni .name { font-weight: 700; color: var(--primary); }
        .selected-alumni .profession { color: #666; font-size: 0.9rem; }
        .btn-remove { color: #e74c3c; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .btn-send { background: var(--success); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-send:hover { background: #27ae60; }
        .btn-send:disabled { background: #bdc3c7; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-top: 5px; }
        .success-msg { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <a href="student-dashboard.html" class="back-link">← Back to Dashboard</a>
            <h2>Request Mentorship</h2>
            <p class="subtitle">Connect with an alumnus for guidance and mentorship</p>

            <form id="mentorshipForm">
                <div class="form-group">
                    <label>Select an Alumni Mentor *</label>
                    <input type="text" id="alumniSearch" placeholder="Search by name, profession, or email..." autocomplete="off">
                    <div class="search-results" id="searchResults" style="display: none;"></div>
                    <div id="alumniError" class="error"></div>
                </div>

                <div id="selectedAlumniDiv" style="display: none;">
                    <div class="selected-alumni">
                        <div class="name" id="selectedAlumniName"></div>
                        <div class="profession" id="selectedAlumniProfession"></div>
                        <button type="button" class="btn-remove" onclick="clearSelection()">✕ Change</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Topic/Subject *</label>
                    <input type="text" id="subject" placeholder="e.g., Career Guidance in AI" required>
                </div>

                <div class="form-group">
                    <label>Message *</label>
                    <textarea id="message" rows="5" placeholder="Tell the mentor about your goals and what you're looking for..." required></textarea>
                </div>

                <div id="successMsg" class="success-msg" style="display: none;"></div>

                <button type="submit" class="btn-send" id="submitBtn" disabled>Send Mentorship Request</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = (typeof BACKEND_URL !== 'undefined') ? BACKEND_URL : 'http://localhost:5000';
        let selectedAlumnitId = null;
        let searchTimeout;

        // Search alumni
        document.getElementById('alumniSearch').addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            const resultsDiv = document.getElementById('searchResults');
            const errorDiv = document.getElementById('alumniError');

            errorDiv.textContent = '';

            if (query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const token = localStorage.getItem('token');
                    const response = await fetch(`${API_URL}/api/search?q=${encodeURIComponent(query)}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!response.ok) throw new Error('Search failed');

                    const alumni = await response.json();
                    if (alumni.length === 0) {
                        resultsDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: #666;">No alumni found</div>';
                    } else {
                        resultsDiv.innerHTML = alumni.map(a => `
                            <div class="alumni-item" onclick="selectAlumni('${a._id}', '${a.fullName}', '${a.profession || 'Not specified'}')">
                                <div class="alumni-name">${a.fullName}</div>
                                <div class="alumni-profession">${a.profession || 'Profession not specified'}</div>
                                <div style="color: #999; font-size: 0.85rem;">${a.email}</div>
                            </div>
                        `).join('');
                    }
                    resultsDiv.style.display = 'block';
                } catch (err) {
                    errorDiv.textContent = 'Error searching alumni';
                    console.error(err);
                }
            }, 300);
        });

        function selectAlumni(id, name, profession) {
            selectedAlumnitId = id;
            document.getElementById('alumniSearch').value = name;
            document.getElementById('selectedAlumniName').textContent = name;
            document.getElementById('selectedAlumniProfession').textContent = profession;
            document.getElementById('selectedAlumniDiv').style.display = 'block';
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }

        function clearSelection() {
            selectedAlumnitId = null;
            document.getElementById('alumniSearch').value = '';
            document.getElementById('selectedAlumniDiv').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('successMsg').style.display = 'none';
        }

        document.getElementById('mentorshipForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedAlumnitId) {
                document.getElementById('alumniError').textContent = 'Please select an alumni mentor';
                return;
            }

            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            
            try {
                const userRes = await fetch(`${API_URL}/api/users/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await userRes.json();

                const requestData = {
                    alumniId: selectedAlumnitId,
                    subject: document.getElementById('subject').value,
                    message: document.getElementById('message').value,
                    studentName: user.fullName || 'Student'
                };

                const response = await fetch(`${API_URL}/api/mentorship/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    document.getElementById('successMsg').textContent = '✓ Mentorship request sent successfully!';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('mentorshipForm').reset();
                    clearSelection();
                    setTimeout(() => window.location.href = 'student-dashboard.html', 2000);
                } else {
                    const error = await response.json();
                    document.getElementById('alumniError').textContent = error.message || 'Failed to send request';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('alumniError').textContent = 'Error sending request';
            }
        });
    </script>
</body>
</html>
